name: Publish PyPI

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Detect changed packages
        id: packages
        env:
          BASE_REF: ${{ github.event.before }}
        run: |
          packages_json=$(python - <<'PY'
          import os
          import json
          import subprocess

          base = os.environ["BASE_REF"]
          if base == "0000000000000000000000000000000000000000":
              base = "HEAD^"

          packages = subprocess.check_output(
              [
                  "python",
                  "scripts/release.py",
                  "changed",
                  "--base",
                  base,
                  "--head",
                  "HEAD",
              ],
              text=True,
          ).splitlines()
          print(json.dumps(packages))
          PY
          )
          echo "packages=$packages_json" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Publish changed packages
        id: publish
        env:
          PACKAGES_JSON: ${{ needs.detect.outputs.packages }}
        run: |
          python - <<'PY' > /tmp/packages.txt
          import json
          import os

          for package in json.loads(os.environ["PACKAGES_JSON"]):
              print(package)
          PY
          : > /tmp/tags.txt
          mkdir -p /tmp/release-bodies

          while IFS= read -r package; do
            version=$(python scripts/get-version.py "$package")
            tag="$package-v$version"
            echo "$tag" >> /tmp/tags.txt
            python scripts/release.py github-release-body "$package" > "/tmp/release-bodies/$tag.md"

            http_status=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${package}/${version}/json")
            if [ "$http_status" = "200" ]; then
              echo "$package $version already exists on PyPI, skipping publish"
              continue
            elif [ "$http_status" != "404" ]; then
              echo "Unexpected PyPI response for $package $version: $http_status"
              exit 1
            fi

            rm -rf dist-publish
            uv build --package "$package" --no-sources --out-dir dist-publish
            uv publish dist-publish/*
          done < /tmp/packages.txt

          {
            echo "tags<<EOF"
            cat /tmp/tags.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Git Tags
        if: steps.publish.outputs.tags != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAGS: ${{ steps.publish.outputs.tags }}
        with:
          script: |
            const fs = require('fs');
            const tags = process.env.TAGS.trim().split('\n').filter(Boolean);
            for (const tag of tags) {
              const ref = `tags/${tag}`;
              try {
                await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                continue;
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              const message = fs.readFileSync(`/tmp/release-bodies/${tag}.md`, 'utf8');
              const tagObject = await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
                message,
                object: context.sha,
                type: 'commit',
              });
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/${ref}`,
                sha: tagObject.data.sha,
              });
            }

      - name: Create GitHub Releases
        if: steps.publish.outputs.tags != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          TAGS: ${{ steps.publish.outputs.tags }}
        with:
          script: |
            const fs = require('fs');
            const tags = process.env.TAGS.trim().split('\n').filter(Boolean);
            for (const tag of tags) {
              const body = fs.readFileSync(`/tmp/release-bodies/${tag}.md`, 'utf8');
              try {
                await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: tag,
                  body,
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }
