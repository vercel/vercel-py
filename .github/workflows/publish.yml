name: Publish PyPI

on:
  push:
    tags:
      - "*-v*"

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Select package
        id: package
        run: |
          while IFS= read -r package; do
            if [ "${GITHUB_REF_NAME}" = "$package-v$(python scripts/get-version.py "$package")" ]; then
              echo "name=$package" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < <(python scripts/package-names.py)

          echo "No workspace package matches tag ${GITHUB_REF_NAME}"
          exit 1

      - name: Verify tag matches package version
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          VERSION=$(python scripts/get-version.py "$PACKAGE_NAME")
          EXPECTED="$PACKAGE_NAME-v$VERSION"
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED" ]; then
            echo "Expected tag $EXPECTED, got ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Check if version already published
        id: pypi
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          VERSION=$(python scripts/get-version.py "$PACKAGE_NAME")
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${PACKAGE_NAME}/${VERSION}/json")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "$PACKAGE_NAME $VERSION already exists on PyPI, skipping publish"
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "$PACKAGE_NAME $VERSION not found on PyPI, proceeding with publish"
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected PyPI response for $PACKAGE_NAME $VERSION: $HTTP_STATUS"
            exit 1
          fi

      - name: Build package
        if: steps.pypi.outputs.should-publish == 'true'
        env:
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: uv build --package "$PACKAGE_NAME" --no-sources

      - name: Publish package
        if: steps.pypi.outputs.should-publish == 'true'
        run: uv publish
