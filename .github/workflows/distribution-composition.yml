name: Distribution composition

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions: {}

jobs:
  ordinary-distributions:
    name: ordinary wheel composition
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --all-packages --locked --python 3.12

      - name: Test installed core, Sandbox, and aggregate wheels
        run: >-
          uv run python scripts/wheel_test.py run
          --package vercel-internal-core
          --package vercel-sandbox
          --package vercel
          --dist-dir dist-ordinary

      - name: Inspect wheel ownership
        run: >-
          uv run python scripts/wheel_test.py check-ownership
          --package vercel-internal-core
          --package vercel-sandbox
          --package vercel
          --dist-dir dist-ordinary

  bundle-distributions:
    name: bundle wheel composition
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --all-packages --locked --python 3.12

      - name: Build bundle dependency closure
        run: |
          uv run python scripts/bundle_release.py build --package vercel-internal-shared-vendored-deps --out-dir dist-bundle
          uv run python scripts/bundle_release.py build --package vercel-headers --out-dir dist-bundle
          uv run python scripts/bundle_release.py build --package vercel-oidc --out-dir dist-bundle
          uv run python scripts/bundle_release.py build --package vercel-internal-core --out-dir dist-bundle
          uv run python scripts/bundle_release.py build --package vercel-sandbox --out-dir dist-bundle

      - name: Test core bundle
        run: >-
          uv run python scripts/bundle_release.py test-wheel
          --package vercel-internal-core
          --dist-dir dist-bundle

      - name: Test Sandbox bundle
        run: >-
          uv run python scripts/bundle_release.py test-wheel
          --package vercel-sandbox
          --dist-dir dist-bundle

      - name: Inspect bundle ownership
        run: >-
          uv run python scripts/wheel_test.py check-ownership
          --package vercel-internal-shared-vendored-deps
          --package vercel-headers-bundle
          --package vercel-oidc-bundle
          --package vercel-internal-core-bundle
          --package vercel-sandbox-bundle
          --dist-dir dist-bundle

  local-lifecycle:
    name: local uninstall and ownership
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --all-packages --locked --python 3.12

      - name: Test local requested-package states
        run: >-
          uv run python scripts/distribution_lifecycle.py
          --dist-dir dist-lifecycle-local
          --mode local

  historical-upgrade:
    name: historical PyPI upgrade
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --all-packages --locked --python 3.12

      - name: Test latest pre-split upgrade
        run: >-
          uv run python scripts/distribution_lifecycle.py
          --dist-dir dist-lifecycle-upgrade
          --mode upgrade

  live-sandbox:
    name: live Sandbox tests
    if: >-
      github.event_name == 'push' &&
      vars.RUN_LIVE_SANDBOX_TESTS == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ci
    permissions:
      contents: read
    env:
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --all-packages --locked --python 3.12

      - name: Run live Sandbox tests
        run: >-
          uv run pytest -v -o addopts="--no-header --capture=tee-sys"
          -m live src/vercel-sandbox/tests/live
