[build-system]
requires = []
build-backend = "no_root_build"
backend-path = ["scripts"]

[dependency-groups]
dev = [
    "ruff>=0.5.0,<1",
    "pytest>=7.0.0,<10",
    "pytest-asyncio<2",
    "pytest-xdist<4",
    "hypothesis>=6.0.0,<7",
    "respx>=0.21.0,<1",
    "uvloop<1",
    "mypy>=1.20.2,<2",
    "build<2",
    "twine<7",
    "zizmor>=1.24.1,<2",
    "hatchling>=1.27.0,<2",
    "trio>=0.33.0,<1",
    "poethepoet>=0.47.0",
    "tomli>=2.0.0,<3; python_version < '3.11'",
]

[tool.uv]
default-groups = ["dev"]
package = false
exclude-newer = "2 days"

[tool.uv.workspace]
members = ["src/vercel-headers", "src/vercel-oidc", "src/vercel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--no-header --capture=tee-sys"
asyncio_mode = "auto"
markers = [
    "live: requires live API credentials (VERCEL_TOKEN, BLOB_READ_WRITE_TOKEN, etc.)",
]

[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = ["src", "src/vercel-oidc", "src/vercel-headers"]

[[tool.mypy.overrides]]
module = [
    "vercel._internal.unstable",
    "vercel._internal.unstable.*",
    "vercel.unstable",
    "vercel.unstable.*",
]
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
no_implicit_optional = true
no_implicit_reexport = true
strict_equality = true
warn_return_any = true

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
isort = { combine-as-imports = true, known-first-party = ["vercel"] }

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = false

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["E501"]

[tool.poe]
include = "scripts/poe/poe.toml"
verbosity = -1

[tool.poe.tasks.lint]
shell = """
$RUFF_CHECK
$RUFF_FORMAT
if [ -z "$WORKSPACE_POE_SCOPE_ARGS" ]; then
  $POE lint-zizmor
fi
"""

[tool.poe.tasks.lint-zizmor]
cmd = "zizmor --offline ."

[tool.poe.tasks.typecheck]
shell = """
$POE typecheck-mypy
"""

[tool.poe.tasks.typecheck-mypy]
cmd = "$MYPY ${WORKSPACE_POE_SCOPE_ARGS:-tests}"

[tool.poe.tasks.test]
shell = """
if [ -n "$WORKSPACE_POE_SCOPE_ARGS" ]; then
  $PYTEST --ignore=tests/test_examples.py $WORKSPACE_POE_SCOPE_ARGS
elif [ -n "$POE_EXTRA_ARGS" ]; then
  $PYTEST --ignore=tests/test_examples.py
else
  $PYTEST --ignore=tests/test_examples.py tests
fi
"""
