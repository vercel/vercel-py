[build-system]
requires = []
build-backend = "no_root_build"
backend-path = ["scripts"]

[dependency-groups]
dev = [
    "ruff>=0.5.0,<1",
    "pytest>=7.0.0,<10",
    "pytest-asyncio<2",
    "pytest-xdist<4",
    "hypothesis>=6.0.0,<7",
    "respx>=0.21.0,<1",
    "uvloop<1",
    "mypy>=1.20.2,<2",
    "build<2",
    "twine<7",
    "zizmor>=1.24.1,<2",
    "hatchling>=1.27.0,<2",
]

[tool.uv]
default-groups = ["dev"]
package = false
exclude-newer = "2 days"

[tool.uv.workspace]
members = ["src/vercel-headers", "src/vercel-oidc", "src/vercel"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
markers = [
    "live: requires live API credentials (VERCEL_TOKEN, BLOB_READ_WRITE_TOKEN, etc.)",
]

[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = ["src", "src/vercel-oidc", "src/vercel-headers"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
isort = { combine-as-imports = true, known-first-party = ["vercel"] }

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = false

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["E501"]
