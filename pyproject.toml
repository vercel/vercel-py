[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "vercel"
version = "0.5.9"
description = "Python SDK for Vercel"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
license-files = ["LICENSE", "LICENSE.*"]
dependencies = [
    "httpx>=0.27.0,<1",
    "pydantic>=2.7.0,<3",
    "anyio>=4.0.0,<5",
    "typing-extensions>=4.0.0,<5 ; python_version < '3.11'",
    "python-dotenv>=1.0.0,<2",
    "websockets>=12.0,<17",
    "cbor2>=6.0,<7",
    "vercel-workers>=0.0.16,<1 ; python_version >= '3.12'",
]

[project.scripts]
vercel = "vercel.__main__:main"
vercel-sandbox = "vercel.sandbox.__main__:main"
sandbox = "vercel.sandbox.__main__:main"

[dependency-groups]
dev = [
    "ruff>=0.5.0,<1",
    "pytest>=7.0.0,<10",
    "pytest-asyncio<2",
    "pytest-xdist<4",
    "hypothesis>=6.0.0,<7",
    "respx>=0.21.0,<1",
    "uvloop<1",
    "mypy>=1.20.2,<2",
    "build<2",
    "twine<7",
    "zizmor>=1.24.1,<2",
]

[tool.uv]
default-groups = ["dev"]
package = true
exclude-newer = "2 days"

[tool.setuptools.packages.find]
where = ["src"]
include = ["vercel*"]
namespaces = true

[tool.setuptools]
include-package-data = false

[tool.setuptools.package-data]
vercel = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
markers = [
    "live: requires live API credentials (VERCEL_TOKEN, BLOB_READ_WRITE_TOKEN, etc.)",
]

[tool.mypy]
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
isort = { combine-as-imports = true, known-first-party = ["vercel"] }

[tool.ruff.lint.pyupgrade]
keep-runtime-typing = false

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["E501"]
