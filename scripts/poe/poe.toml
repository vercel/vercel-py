[tool.poe.env]
POE = { default = "${POE_CONF_DIR}/tasks/poe" }
PYTEST = { default = "${POE_CONF_DIR}/tasks/pytest" }
RUFF_CHECK = { default = "${POE_CONF_DIR}/tasks/ruff-check" }
RUFF_CHECK_FIX = { default = "${POE_CONF_DIR}/tasks/ruff-check-fix" }
RUFF_FORMAT = { default = "${POE_CONF_DIR}/tasks/ruff-format" }
RUFF_FORMAT_FIX = { default = "${POE_CONF_DIR}/tasks/ruff-format-fix" }
TY = { default = "${POE_CONF_DIR}/tasks/ty" }
MYPY = { default = "${POE_CONF_DIR}/tasks/mypy" }

[tool.poe.tasks.fix]
shell = """
set -e
$RUFF_CHECK_FIX
$RUFF_FORMAT_FIX
"""

[tool.poe.tasks.lint]
shell = """
set -e
if [ "${WORKSPACE_POE_PARALLEL:-}" = 0 ] || [ "${WORKSPACE_POE_PARALLEL:-}" = false ] || [ "${WORKSPACE_POE_PARALLEL:-}" = no ]; then
  $RUFF_CHECK
  $RUFF_FORMAT
else
  /usr/bin/env bash -c '
    set -euo pipefail
    . "$POE_CONF_DIR/workspace-poe.sh"
    workspace_poe_reset_jobs
    workspace_poe_start_job "ruff check" "$RUFF_CHECK"
    workspace_poe_start_job "ruff format" "$RUFF_FORMAT"
    workspace_poe_wait_jobs || true
    workspace_poe_print_jobs
  '
fi
"""

[tool.poe.tasks.typecheck]
shell = """
set -e
if [ "${WORKSPACE_POE_PARALLEL:-}" = 0 ] || [ "${WORKSPACE_POE_PARALLEL:-}" = false ] || [ "${WORKSPACE_POE_PARALLEL:-}" = no ]; then
  $POE typecheck-mypy
  $POE typecheck-ty
else
  /usr/bin/env bash -c '
    set -euo pipefail
    . "$POE_CONF_DIR/workspace-poe.sh"
    workspace_poe_reset_jobs
    workspace_poe_start_job mypy "$POE" typecheck-mypy
    workspace_poe_start_job ty "$POE" typecheck-ty
    workspace_poe_wait_jobs || true
    workspace_poe_print_jobs
  '
fi
"""

[tool.poe.tasks.typecheck-mypy]
cmd = "$MYPY"

[tool.poe.tasks.typecheck-ty]
cmd = "$TY"

[tool.poe.tasks.test]
shell = """
$PYTEST
"""
